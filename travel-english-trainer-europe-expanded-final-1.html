let activeCat='all', filtered=[], idx=0, know=0, again=0, sentCat='all', phoneCat='all', liveCat='all', proCat='all', qc=0, qw=0, quizCorrect=0, quizDone=false;

function speak(text){ if(!window.speechSynthesis){alert('当前浏览器不支持语音');return;} speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text.replace(/\[[^\]]+\]/g,'')); u.lang='en-US'; u.rate=.82; speechSynthesis.speak(u); }
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function switchTab(t){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active')}
function pills(id,cats,active,fn){document.getElementById(id).innerHTML=['全部',...cats].map(c=>{let v=c==='全部'?'all':c;return `<button class="cat-pill ${v===active?'active':''}" onclick="${fn}('${v}',this)">${c}</button>`}).join('')}
function init(){pills('catPills',[...new Set(vocab.map(v=>v.cat))],activeCat,'setVocabCat');loadCards();pills('sentCatPills',[...new Set(sentences.map(s=>s.cat))],sentCat,'setSentCat');renderSentences();pills('phoneCatPills',[...new Set(phoneDialogs.map(s=>s.cat))],phoneCat,'setPhoneCat');renderPhone();pills('liveCatPills',[...new Set(liveScenarios.map(s=>s.cat))],liveCat,'setLiveCat');renderLive();pills('proCatPills',[...new Set(proToolkit.map(s=>s.cat))],proCat,'setProCat');renderPro();nextQuiz();}
function setVocabCat(c,b){activeCat=c;document.querySelectorAll('#catPills .cat-pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');idx=0;know=0;again=0;loadCards()}
function loadCards(){filtered=activeCat==='all'?[...vocab]:vocab.filter(v=>v.cat===activeCat);shuffle(filtered);document.getElementById('totalCount').innerText=filtered.length;showCard()}
function showCard(){document.getElementById('knowCount').innerText=know;document.getElementById('againCount').innerText=again;if(idx>=filtered.length){document.getElementById('flashcard').innerHTML='<div class="en">🎉 本轮完成</div><button class="btn gold" onclick="loadCards()">重新开始</button>';return}let c=filtered[idx];document.getElementById('cardCounter').innerText=`${idx+1} / ${filtered.length}`;document.getElementById('flashcard').innerHTML=`<div class="tag">${c.cat}</div><div class="en">${c.en}</div><div class="phonetic">${c.phonetic}</div><button class="speak" onclick="speak('${esc(c.en)}')">🔊 朗读单词</button> <button class="speak" onclick="speak('${esc(c.example)}')">🔊 朗读例句</button><div class="zh" id="cardZh"><b>${c.zh}</b><div class="example">例：${c.example}</div></div><div class="btnrow"><button class="btn" onclick="document.getElementById('cardZh').classList.add('show')">查看中文</button><button class="btn rust" onclick="again++;idx++;showCard()">再练</button><button class="btn teal" onclick="know++;idx++;showCard()">掌握</button></div>`}
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function setSentCat(c,b){sentCat=c;document.querySelectorAll('#sentCatPills .cat-pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderSentences()}
function renderSentences(){let list=sentCat==='all'?sentences:sentences.filter(s=>s.cat===sentCat);document.getElementById('sentenceList').innerHTML='<div class="section-title">📝 实用句型</div>'+list.map(s=>`<div class="sentence-card"><div class="type">${s.type}</div><div class="sentence-en">${s.en}</div><button class="speak" onclick="speak('${esc(s.en)}')">🔊 朗读</button><div class="sentence-zh">${s.zh}</div></div>`).join('')}
function setPhoneCat(c,b){phoneCat=c;document.querySelectorAll('#phoneCatPills .cat-pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderPhone()}
function renderPhone(){let list=phoneCat==='all'?phoneDialogs:phoneDialogs.filter(s=>s.cat===phoneCat);document.getElementById('phoneList').innerHTML='<div class="section-title">📞 电话情景</div>'+list.map(d=>`<div class="phone-card"><div class="type">${d.scenario}</div>${d.lines.map(l=>`<div class="line ${l[0]==='YOU'?'you':''}"><div class="speaker">${l[0]}</div>${l[1]} <button class="speak" onclick="speak('${esc(l[1])}')">🔊</button></div>`).join('')}<div class="tip">💡 ${d.tip}</div></div>`).join('')}
function setLiveCat(c,b){liveCat=c;document.querySelectorAll('#liveCatPills .cat-pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderLive()}
function renderLive(){let list=liveCat==='all'?liveScenarios:liveScenarios.filter(s=>s.cat===liveCat);document.getElementById('liveList').innerHTML='<div class="section-title">🔥 实战场景</div>'+list.map(s=>`<div class="sentence-card"><div class="type">${s.title} ｜ ${s.role}</div>${s.key.map(k=>`<div class="sentence-en">${k[0]}</div><button class="speak" onclick="speak('${esc(k[0])}')">🔊 朗读</button><div class="sentence-zh">${k[1]}</div>`).join('')}<div class="tip">💡 ${s.tip}</div></div>`).join('')}
function setProCat(c,b){proCat=c;document.querySelectorAll('#proCatPills .cat-pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderPro()}
function renderPro(){let list=proCat==='all'?proToolkit:proToolkit.filter(s=>s.cat===proCat);document.getElementById('proList').innerHTML='<div class="section-title">🧠 定制师工作台</div>'+list.map((s,i)=>`<div class="sentence-card"><div class="type">${s.title}</div><pre id="pro-${i}">${s.content}</pre><button class="copy" onclick="copyText('pro-${i}',this)">📋 复制</button><button class="speak" onclick="speak(document.getElementById('pro-${i}').innerText)">🔊 朗读</button></div>`).join('')}
function copyText(id,btn){navigator.clipboard.writeText(document.getElementById(id).innerText).then(()=>{btn.innerText='✅ 已复制';setTimeout(()=>btn.innerText='📋 复制',1200)})}
function nextQuiz(){quizDone=false;let pool=shuffle([...vocab]);let correct=pool[0];let opts=shuffle(pool.slice(0,4));quizCorrect=opts.findIndex(o=>o.en===correct.en);document.getElementById('qCorrect').innerText=qc;document.getElementById('qWrong').innerText=qw;document.getElementById('quizArea').innerHTML=`<div class="card"><div class="tag">请选择中文释义</div><div class="en">${correct.en}</div><button class="speak" onclick="speak('${esc(correct.en)}')">🔊 听读音</button><div class="btnrow" style="display:block">${opts.map((o,i)=>`<button class="btn light" style="display:block;width:100%;margin:8px 0;text-align:left" onclick="answerQuiz(${i},${quizCorrect},this)">${o.zh}</button>`).join('')}</div><div id="qfb" class="example"></div></div>`}
function answerQuiz(i,c,b){if(quizDone)return;quizDone=true;if(i===c){qc++;b.className='btn teal'}else{qw++;b.className='btn rust';document.querySelectorAll('#quizArea .btn.light')[c]?.classList.add('teal')}document.getElementById('qCorrect').innerText=qc;document.getElementById('qWrong').innerText=qw;document.getElementById('qfb').innerHTML='<br><button class="btn gold" onclick="nextQuiz()">下一题 →</button>'}
window.onload=init;
</script>
