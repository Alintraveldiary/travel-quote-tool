<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行定制师英语训练营 Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --rust: #b5451b;
    --teal: #1a6b6b;
    --teal-light: #e0f0f0;
    --muted: #8a8070;
    --white: #fff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 10% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(26,107,107,0.08) 0%, transparent 50%);
  }

  header {
    background: var(--ink);
    color: var(--paper);
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--gold);
  }

  .header-inner {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    letter-spacing: 0.02em;
    color: var(--gold);
  }

  header span {
    font-size: 0.75rem;
    color: #888;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.1);
    margin-top: 10px;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 100px;
  }

  /* TAB NAV */
  .tabs {
    display: flex;
    gap: 0;
    margin: 20px 0 24px;
    background: var(--white);
    border-radius: 12px;
    padding: 4px;
    box-shadow: 0 2px 12px rgba(26,26,46,0.08);
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex: 0 0 auto;
    min-width: 74px;
    padding: 10px 8px;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .tab-btn.active {
    background: var(--ink);
    color: var(--gold);
  }

  /* CATEGORY PILLS */
  .cat-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 20px;
    scrollbar-width: none;
  }

  .cat-scroll::-webkit-scrollbar { display: none; }

  .cat-pill {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1.5px solid var(--gold-light);
    background: var(--white);
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .cat-pill.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
  }

  /* FLASHCARD */
  .card-wrap {
    perspective: 1000px;
    margin-bottom: 20px;
  }

  .flashcard {
    background: var(--white);
    border-radius: 20px;
    padding: 36px 28px 28px;
    box-shadow: 0 4px 24px rgba(26,26,46,0.1), 0 1px 4px rgba(26,26,46,0.06);
    position: relative;
    border-top: 4px solid var(--gold);
    min-height: 220px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .flashcard:active {
    transform: scale(0.99);
    box-shadow: 0 2px 12px rgba(26,26,46,0.08);
  }

  .card-tag {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .card-en {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .card-phonetic {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }

  .card-reveal {
    background: var(--teal-light);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.9rem;
    color: var(--teal);
    font-weight: 500;
    display: none;
    animation: fadeUp 0.3s ease;
  }

  .card-reveal.shown { display: block; }

  .card-example {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 8px;
    font-style: italic;
    line-height: 1.5;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-reveal {
    background: var(--ink);
    color: var(--gold);
  }

  .btn-know {
    background: var(--teal);
    color: var(--white);
  }

  .btn-again {
    background: var(--rust);
    color: var(--white);
  }

  .btn-next {
    background: var(--gold);
    color: var(--ink);
    font-weight: 600;
  }

  .btn:active { opacity: 0.85; transform: scale(0.98); }

  /* COUNTER */
  .card-counter {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* SCORE BADGES */
  .score-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .score-badge {
    flex: 1;
    background: var(--white);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(26,26,46,0.06);
  }

  .score-badge .num {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
  }

  .score-badge .label {
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .score-badge.green .num { color: var(--teal); }
  .score-badge.red .num { color: var(--rust); }
  .score-badge.gold .num { color: var(--gold); }

  /* SENTENCE SECTION */
  .sentence-card {
    background: var(--white);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(26,26,46,0.07);
    border-left: 4px solid var(--teal);
    animation: fadeUp 0.3s ease;
  }

  .sentence-type {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--teal);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .sentence-en {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    line-height: 1.5;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .sentence-zh {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.5;
    display: none;
  }

  .sentence-zh.shown { display: block; animation: fadeUp 0.25s ease; }

  .sentence-toggle {
    font-size: 0.75rem;
    color: var(--gold);
    cursor: pointer;
    margin-top: 8px;
    font-weight: 500;
    display: inline-block;
  }

  /* PHONE SECTION */
  .phone-card {
    background: var(--ink);
    color: var(--paper);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: 0 4px 16px rgba(26,26,46,0.15);
    animation: fadeUp 0.3s ease;
  }

  .phone-scenario {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 10px;
    font-weight: 600;
  }

  .phone-speaker {
    font-size: 0.7rem;
    color: #888;
    margin-bottom: 4px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .phone-line {
    font-size: 0.9rem;
    line-height: 1.55;
    margin-bottom: 12px;
    color: var(--paper);
  }

  .phone-line.you {
    color: var(--gold-light);
    padding-left: 12px;
    border-left: 2px solid var(--gold);
  }

  .phone-tip {
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.78rem;
    color: #aaa;
    margin-top: 8px;
    line-height: 1.5;
  }

  .phone-tip::before {
    content: "💡 ";
  }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gold-light);
  }

  /* QUIZ MODE */
  .quiz-card {
    background: var(--white);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 4px 24px rgba(26,26,46,0.1);
    margin-bottom: 20px;
    border-top: 4px solid var(--rust);
  }

  .quiz-q {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .quiz-prompt {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    margin-bottom: 20px;
    color: var(--ink);
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .quiz-opt {
    padding: 13px 16px;
    border: 1.5px solid var(--gold-light);
    border-radius: 10px;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--ink);
  }

  .quiz-opt:hover { border-color: var(--gold); background: rgba(201,168,76,0.05); }
  .quiz-opt.correct { background: var(--teal-light); border-color: var(--teal); color: var(--teal); font-weight: 600; }
  .quiz-opt.wrong { background: #fde8e0; border-color: var(--rust); color: var(--rust); }

  .quiz-feedback {
    margin-top: 14px;
    font-size: 0.82rem;
    color: var(--muted);
    display: none;
    animation: fadeUp 0.3s ease;
  }

  .quiz-feedback.shown { display: block; }



  /* LIVE SCENARIO SECTION */
  .live-card {
    background: var(--white);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 3px 16px rgba(26,26,46,0.08);
    border-left: 4px solid var(--gold);
    animation: fadeUp 0.3s ease;
  }

  .live-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.08rem;
    color: var(--ink);
    margin-bottom: 8px;
    font-weight: 700;
  }

  .live-meta {
    display: inline-flex;
    gap: 6px;
    align-items: center;
    font-size: 0.72rem;
    color: var(--teal);
    background: var(--teal-light);
    padding: 5px 9px;
    border-radius: 999px;
    margin-bottom: 14px;
    font-weight: 600;
  }

  .live-subtitle {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    font-weight: 700;
    margin: 14px 0 8px;
  }

  .live-key {
    border-bottom: 1px solid rgba(201,168,76,0.18);
    padding: 10px 0;
  }

  .live-key:last-child { border-bottom: none; }

  .live-en {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    line-height: 1.45;
    color: var(--ink);
    margin-bottom: 5px;
  }

  .live-zh {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.45;
  }

  .live-dialog {
    background: rgba(26,26,46,0.04);
    border-radius: 12px;
    padding: 12px;
    margin-top: 8px;
  }

  .live-dialog-line {
    margin-bottom: 10px;
  }

  .live-speaker {
    font-size: 0.68rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.07em;
    margin-bottom: 3px;
  }

  .live-dialog-text {
    font-size: 0.88rem;
    line-height: 1.5;
    color: var(--ink);
  }

  .live-dialog-text.you {
    color: var(--teal);
    font-weight: 600;
  }

  /* hidden section */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* TTS SPEAK BUTTON */
  .speak-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1.5px solid var(--gold-light);
    background: transparent;
    font-size: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    vertical-align: middle;
  }

  .speak-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.06); }
  .speak-btn.speaking { border-color: var(--teal); color: var(--teal); background: var(--teal-light); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .speak-btn svg { width: 13px; height: 13px; fill: currentColor; }

  /* Card speak row */
  .card-speak-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  /* Speed selector */
  .speed-select {
    font-size: 0.72rem;
    color: var(--muted);
    border: 1px solid var(--gold-light);
    border-radius: 6px;
    padding: 3px 6px;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }

  /* Voice notice */
  .voice-notice {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 12px;
    opacity: 0.7;
  }

  /* Phone line speak */
  .phone-line-wrap {
    margin-bottom: 10px;
  }

  .phone-line-wrap .phone-line {
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Travel English</h1>
    <span>旅行定制师专用</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</header>

<div class="container">

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('vocab')">📇 单词</button>
    <button class="tab-btn" onclick="switchTab('sentences')">✉️ 句子</button>
    <button class="tab-btn" onclick="switchTab('phone')">📞 电话</button>
    <button class="tab-btn" onclick="switchTab('live')">🔥 实战</button>
    <button class="tab-btn" onclick="switchTab('pro')">🧠 工作台</button>
    <button class="tab-btn" onclick="switchTab('quiz')">🎯 测试</button>
  </div>

  <!-- ===== VOCAB TAB ===== -->
  <div class="tab-content active" id="tab-vocab">
    <div class="voice-notice" id="voiceNotice">正在加载语音引擎…</div>
    <div class="score-row">
      <div class="score-badge green"><div class="num" id="knowCount">0</div><div class="label">已掌握</div></div>
      <div class="score-badge red"><div class="num" id="againCount">0</div><div class="label">再练</div></div>
      <div class="score-badge gold"><div class="num" id="totalCount">0</div><div class="label">共</div></div>
    </div>

    <div class="cat-scroll" id="catPills"></div>

    <div class="card-counter" id="cardCounter"></div>

    <div class="card-wrap">
      <div class="flashcard" id="flashcard">
        <div>
          <div class="card-tag" id="cardTag"></div>
          <div class="card-en" id="cardEn"></div>
          <div class="card-phonetic" id="cardPhonetic"></div>
          <div class="card-reveal" id="cardReveal">
            <div id="cardZh"></div>
            <div class="card-example" id="cardExample"></div>
          </div>
        </div>
        <div class="card-actions" id="cardActions">
          <button class="btn btn-reveal" onclick="revealCard()">点击查看释义</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== SENTENCES TAB ===== -->
  <div class="tab-content" id="tab-sentences">
    <div class="cat-scroll" id="sentCatPills"></div>
    <div id="sentenceList"></div>
  </div>

  <!-- ===== PHONE TAB ===== -->
  <div class="tab-content" id="tab-phone">
    <div class="cat-scroll" id="phoneCatPills"></div>
    <div id="phoneList"></div>
  </div>


  <!-- ===== LIVE TAB ===== -->
  <div class="tab-content" id="tab-live">
    <div class="voice-notice">真实旅游场景｜客户现场可直接照着说</div>
    <div class="cat-scroll" id="liveCatPills"></div>
    <div id="liveList"></div>
  </div>

  <!-- ===== PRO TAB ===== -->
  <div class="tab-content" id="tab-pro">
    <div class="voice-notice">定制师工作台｜邮件、电话、供应商沟通、突发处理，可复制可朗读</div>
    <div class="cat-scroll" id="proCatPills"></div>
    <div id="proList"></div>
  </div>

  <!-- ===== QUIZ TAB ===== -->
  <div class="tab-content" id="tab-quiz">
    <div class="score-row">
      <div class="score-badge green"><div class="num" id="qCorrect">0</div><div class="label">答对</div></div>
      <div class="score-badge red"><div class="num" id="qWrong">0</div><div class="label">答错</div></div>
    </div>
    <div id="quizArea"></div>
  </div>

</div>

<script>
// ============================================================
// DATA
// ============================================================
const vocab = [
  // --- FLIGHT ---
  { en: "one-way ticket", phonetic: "/wʌn weɪ ˈtɪkɪt/", zh: "单程票", example: "I'd like to book a one-way ticket to Tokyo.", cat: "机票" },
  { en: "round-trip ticket", phonetic: "/raʊnd trɪp ˈtɪkɪt/", zh: "往返票", example: "Do you have round-trip tickets available for this weekend?", cat: "机票" },
  { en: "business class", phonetic: "/ˈbɪznɪs klɑːs/", zh: "商务舱", example: "I'd like to upgrade to business class if possible.", cat: "机票" },
  { en: "economy class", phonetic: "/ɪˈkɒnəmi klɑːs/", zh: "经济舱", example: "Two seats in economy class, please.", cat: "机票" },
  { en: "layover / stopover", phonetic: "/ˈleɪəʊvər/", zh: "中转/经停", example: "We have a 4-hour layover in Singapore.", cat: "机票" },
  { en: "connecting flight", phonetic: "/kəˈnektɪŋ flaɪt/", zh: "转机航班", example: "What's the connecting flight number?", cat: "机票" },
  { en: "checked baggage", phonetic: "/tʃekt ˈbæɡɪdʒ/", zh: "托运行李", example: "The checked baggage allowance is 23kg.", cat: "机票" },
  { en: "carry-on luggage", phonetic: "/ˈkæri ɒn ˈlʌɡɪdʒ/", zh: "随身行李", example: "Only one carry-on luggage is allowed.", cat: "机票" },
  { en: "seat preference", phonetic: "/siːt ˈprefrəns/", zh: "座位偏好", example: "Do you have any seat preference — window or aisle?", cat: "机票" },
  { en: "aisle seat", phonetic: "/aɪl siːt/", zh: "靠通道座位", example: "My client prefers an aisle seat.", cat: "机票" },
  { en: "itinerary confirmation", phonetic: "/aɪˈtɪnərəri ˌkɒnfəˈmeɪʃən/", zh: "行程确认单", example: "I'll send you the itinerary confirmation shortly.", cat: "机票" },
  { en: "flight cancellation", phonetic: "/flaɪt ˌkænsəˈleɪʃən/", zh: "航班取消", example: "We need to rebook due to a flight cancellation.", cat: "机票" },

  // --- HOTEL ---

function initTTS() {
  const notice = document.getElementById('voiceNotice');
  if (!window.speechSynthesis) {
    notice.textContent = '⚠️ 当前浏览器不支持语音朗读';
    return;
  }

  const tryLoad = () => {
    const voices = speechSynthesis.getVoices();
    // Prefer high-quality English voices
    const preferred = [
      'Samantha', 'Karen', 'Daniel', 'Moira',   // macOS/iOS
      'Google UK English Female', 'Google US English',
      'Microsoft Zira', 'Microsoft David',
      'en-US-Neural2', 'en-GB-Neural2'
    ];
    let picked = null;
    for (const name of preferred) {
      picked = voices.find(v => v.name.includes(name));
      if (picked) break;
    }
    if (!picked) picked = voices.find(v => v.lang.startsWith('en'));
    ttsVoice = picked || null;

    if (ttsVoice) {
      notice.textContent = `🔊 语音：${ttsVoice.name.split(' ').slice(0,3).join(' ')}`;
    } else if (voices.length > 0) {
      notice.textContent = '⚠️ 未找到英语语音，请在系统设置中安装英语语音包';
    } else {
      notice.textContent = '正在加载语音引擎…';
    }
  };

  tryLoad();
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = tryLoad;
  }
}

function speak(text, btnEl) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();

  // Clean text for TTS (remove phonetic markers like / ... /)
  const clean = text.replace(/\/[^/]+\//g, '').replace(/\[.*?\]/g, '').trim();

  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'en-US';
  utter.rate = ttsRate;
  utter.pitch = 1;
  if (ttsVoice) utter.voice = ttsVoice;

  // Button state
  const allBtns = document.querySelectorAll('.speak-btn');
  allBtns.forEach(b => b.classList.remove('speaking'));

  if (btnEl) {
    btnEl.classList.add('speaking');
    utter.onend = () => btnEl.classList.remove('speaking');
    utter.onerror = () => btnEl.classList.remove('speaking');
  }

  speechSynthesis.speak(utter);
}

function speakIcon() {
  return `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>`;
}

function setSpeed(val) {
  ttsRate = parseFloat(val);
}

// ============================================================
// VOCAB
// ============================================================
function buildVocabCats() {
  const el = document.getElementById('catPills');
  const cats = ['全部', ...allCats];
  el.innerHTML = cats.map((c,i) => `<button class="cat-pill ${i===0?'active':''}" onclick="setVocabCat('${c==='全部'?'all':c}', this)">${c}</button>`).join('');
}

function setVocabCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('#catPills .cat-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  cardIndex = 0; knowCount = 0; againCount = 0;
  updateScores();
  loadCards();
}

function loadCards() {
  filteredCards = activeCat === 'all' ? [...vocab] : vocab.filter(v => v.cat === activeCat);
  shuffle(filteredCards);
  document.getElementById('totalCount').textContent = filteredCards.length;
  showCard();
}

function showCard() {
  const card = filteredCards[cardIndex];
  if (!card) {
    document.getElementById('flashcard').innerHTML = `<div class="empty-state">🎉 本轮全部完成！<br><br><button class="btn btn-next" style="width:100%" onclick="loadCards()">重新开始</button></div>`;
    return;
  }
  revealed = false;
  document.getElementById('cardTag').textContent = card.cat;
  document.getElementById('cardEn').textContent = card.en;
  document.getElementById('cardPhonetic').innerHTML = `
    ${card.phonetic}
    &nbsp;
    <button class="speak-btn" onclick="speak('${card.en.replace(/'/g,"\\'")}', this)" title="朗读单词">
      ${speakIcon()} 单词
    </button>
    <button class="speak-btn" onclick="speak('${card.example.replace(/'/g,"\\'")}', this)" title="朗读例句">
      ${speakIcon()} 例句
    </button>
    <select class="speed-select" onchange="setSpeed(this.value)" title="语速">
      <option value="0.7">慢速</option>
      <option value="0.9" selected>正常</option>
      <option value="1.2">快速</option>
    </select>
  `;
  document.getElementById('cardZh').textContent = card.zh;
  document.getElementById('cardExample').textContent = '例：' + card.example;
  document.getElementById('cardReveal').classList.remove('shown');
  document.getElementById('cardActions').innerHTML = `<button class="btn btn-reveal" onclick="revealCard()">点击查看释义</button>`;
  document.getElementById('cardCounter').textContent = `${cardIndex + 1} / ${filteredCards.length}`;
  document.getElementById('progressFill').style.width = ((cardIndex / filteredCards.length) * 100) + '%';
}

function revealCard() {
  document.getElementById('cardReveal').classList.add('shown');
  document.getElementById('cardActions').innerHTML = `
    <button class="btn btn-again" onclick="markCard(false)">🔁 再练</button>
    <button class="btn btn-know" onclick="markCard(true)">✓ 掌握</button>
  `;
}

function markCard(know) {
  if (know) knowCount++; else againCount++;
  updateScores();
  cardIndex++;
  showCard();
}

function updateScores() {
  document.getElementById('knowCount').textContent = knowCount;
  document.getElementById('againCount').textContent = againCount;
}

function buildPhoneCats() {
  const cats = ['全部', ...new Set(phoneDialogs.map(p => p.cat))];
  const el = document.getElementById('phoneCatPills');
  el.innerHTML = cats.map((c,i) => `<button class="cat-pill ${i===0?'active':''}" onclick="setPhoneCat('${c==='全部'?'all':c}', this)">${c}</button>`).join('');
}

function setPhoneCat(cat, btn) {
  phoneActiveCat = cat;
  document.querySelectorAll('#phoneCatPills .cat-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderPhone();
}

function renderPhone() {
  const list = phoneActiveCat === 'all' ? phoneDialogs : phoneDialogs.filter(p => p.cat === phoneActiveCat);
  let html = `<div class="section-title">📞 电话情景对话</div>`;
  list.forEach((d, di) => {
    html += `<div class="phone-card">
      <div class="phone-scenario">${d.scenario}
        <button class="speak-btn" style="margin-left:8px;border-color:rgba(201,168,76,0.4);color:#c9a84c;" onclick="playDialog(${di}, 0)" title="连续播放全部对话">${speakIcon()} 全部播放</button>
      </div>`;
    d.lines.forEach((l, li) => {
      const safeText = l.text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      html += `
      <div class="phone-line-wrap">
        <div class="phone-speaker">${l.speaker}</div>
        <div class="phone-line ${l.speaker==='YOU'?'you':''}" id="pline-${di}-${li}">${l.text}
          <button class="speak-btn" style="margin-left:8px;${l.speaker==='YOU'?'border-color:rgba(201,168,76,0.5);color:var(--gold-light)':''}" onclick="speak('${safeText}', this)">${speakIcon()}</button>
        </div>
      </div>`;
    });
    html += `<div class="phone-tip">${d.tip}</div></div>`;
  });
  document.getElementById('phoneList').innerHTML = html;
}

// Play full dialog sequentially
function playDialog(di, li) {
  const d = (phoneActiveCat === 'all' ? phoneDialogs : phoneDialogs.filter(p => p.cat === phoneActiveCat))[di];
  if (!d || li >= d.lines.length) return;
  speechSynthesis.cancel();

  const lineEl = document.getElementById(`pline-${di}-${li}`);
  const btn = lineEl ? lineEl.querySelector('.speak-btn') : null;

  const utter = new SpeechSynthesisUtterance(d.lines[li].text);
  utter.lang = 'en-US';
  utter.rate = ttsRate;
  if (ttsVoice) utter.voice = ttsVoice;

  // Highlight current line
  document.querySelectorAll('.phone-line').forEach(el => el.style.opacity = '0.45');
  if (lineEl) lineEl.style.opacity = '1';
  if (btn) btn.classList.add('speaking');

  utter.onend = () => {
    if (btn) btn.classList.remove('speaking');
    setTimeout(() => playDialog(di, li + 1), 400);
  };
  utter.onerror = () => {
    if (btn) btn.classList.remove('speaking');
    document.querySelectorAll('.phone-line').forEach(el => el.style.opacity = '1');
  };
  if (li === d.lines.length - 1) {
    utter.onend = () => {
      if (btn) btn.classList.remove('speaking');
      document.querySelectorAll('.phone-line').forEach(el => el.style.opacity = '1');
    };
  }
  speechSynthesis.speak(utter);
}

function escForAttr(text) {
  return text.replace(/&/g, '&amp;').replace(/'/g, "&#39;").replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderLive() {
  const list = liveActiveCat === 'all' ? liveScenarios : liveScenarios.filter(s => s.cat === liveActiveCat);

  list.forEach((s) => {
    html += `<div class="live-card">
      <div class="live-title">${s.title}</div>
      <div class="live-meta">${s.cat} ｜ ${s.role}</div>
      <div class="live-subtitle">救命句 / 客户可直接照读</div>
      ${s.key.map(k => {
        const safeEn = escForAttr(k.en);
        return `<div class="live-key">
          <div class="live-en">${k.en}</div>
          <div class="live-zh">${k.zh}</div>
          <button class="speak-btn" style="margin-top:6px;" onclick="speak('${safeEn}', this)">${speakIcon()} 朗读</button>
        </div>`;
      }).join('')}
      ${s.dialog && s.dialog.length ? `<div class="live-subtitle">完整对话 / 进阶练习</div>
      <div class="live-dialog">
        ${s.dialog.map(l => {
          const safeText = escForAttr(l.text);
          return `<div class="live-dialog-line">
            <div class="live-speaker">${l.speaker}</div>
            <div class="live-dialog-text ${l.speaker==='YOU'?'you':''}">${l.text}
              <button class="speak-btn" style="margin-left:6px;" onclick="speak('${safeText}', this)">${speakIcon()}</button>
            </div>
          </div>`;
        }).join('')}
      </div>` : ''}
      <div class="phone-tip">${s.tip}</div>
    </div>`;
  });

  document.getElementById('liveList').innerHTML = html;
}


// ============================================================
// PRO TOOLKIT
// ============================================================
let proActiveCat = "all";

function buildProCats() {
  const cats = ['全部', ...new Set(proToolkit.map(s => s.cat))];
  const el = document.getElementById('proCatPills');
  if (!el) return;
  el.innerHTML = cats.map((c,i) =>
    `<button class="cat-pill ${i===0?'active':''}" onclick="setProCat('${c==='全部'?'all':c}', this)">${c}</button>`
  ).join('');
}

function setProCat(cat, btn) {
  proActiveCat = cat;
  document.querySelectorAll('#proCatPills .cat-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderPro();
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function jsSafe(text) {
  return text.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
}

function renderPro() {
  const list = proActiveCat === 'all' ? proToolkit : proToolkit.filter(s => s.cat === proActiveCat);
  let html = `<div class="section-title">🧠 定制师工作台</div>`;

  list.forEach((s, index) => {
    const safeContent = escapeHtml(s.content);
    const safeSpeak = jsSafe(s.content);
    html += `
    <div class="sentence-card">
      <div class="sentence-type">${s.title}</div>
      <pre class="pro-template" style="white-space:pre-wrap;font-size:0.86rem;line-height:1.65;margin-top:10px;color:#333;font-family:'DM Sans',sans-serif;">${safeContent}</pre>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
        <button class="speak-btn" onclick="copyText(this)">📋 复制</button>
        <button class="speak-btn" onclick="speak('${safeSpeak}', this)">${speakIcon()} 朗读</button>
      </div>
    </div>`;
  });

  document.getElementById('proList').innerHTML = html;
}

function copyText(btn){
  const text = btn.closest('.sentence-card').querySelector('pre').innerText;
  const done = () => {
    btn.innerText = "✅ 已复制";
    setTimeout(()=> btn.innerText="📋 复制",1500);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, done){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  done();
}

// ============================================================
// QUIZ
// ============================================================
function loadQuiz() {
  quizIndex = 0; qCorrect = 0; qWrong = 0;
  updateQScores();
  nextQuiz();
}

function nextQuiz() {
  quizAnswered = false;
  const pool = [...vocab];
  shuffle(pool);
  const correct = pool[0];
  const wrongs = pool.slice(1, 4);
  const options = shuffle([correct, ...wrongs]);
  const correctIdx = options.indexOf(correct);
  const safeEn = correct.en.replace(/'/g, "\\'");

  document.getElementById('quizArea').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-q">以下哪个是正确的中文释义？</div>
      <div class="quiz-prompt">${correct.en}
        <button class="speak-btn" style="font-size:0.72rem;margin-left:8px;" onclick="speak('${safeEn}', this)">${speakIcon()} 听读音</button>
      </div>
      <div class="quiz-options">
        ${options.map((o, i) => `<button class="quiz-opt" onclick="answerQuiz(${i}, ${correctIdx}, this)">${o.zh}</button>`).join('')}
      </div>
      <div class="quiz-feedback" id="quizFb">
        <b>例句：</b>${correct.example}
        <br><br>
        <button class="btn btn-next" onclick="nextQuiz()">下一题 →</button>
      </div>
    </div>`;
}

function answerQuiz(i, correctIdx, btn) {
  if (quizAnswered) return;
  quizAnswered = true;
  const opts = document.querySelectorAll('.quiz-opt');
  if (i === correctIdx) {
    btn.classList.add('correct');
    qCorrect++;
  } else {
    btn.classList.add('wrong');
    opts[correctIdx].classList.add('correct');
    qWrong++;
  }
  opts.forEach(o => o.disabled = true);
  document.getElementById('quizFb').classList.add('shown');
  updateQScores();
}

function updateQScores() {
  document.getElementById('qCorrect').textContent = qCorrect;
  document.getElementById('qWrong').textContent = qWrong;
}

// ============================================================
// UTILS
// ============================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
