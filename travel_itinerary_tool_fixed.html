function getDB(dest) {
  var keys = Object.keys(DEST_DB);
  for (var i=0;i<keys.length;i++) {
    var k=keys[i];
    if (dest.indexOf(k)>=0||k.indexOf(dest)>=0) { var db=Object.assign({},DEST_DB[k]); db.key=k; return db; }
  }
  return {key:dest,cities:[dest],highlights:['当地文化体验','特色美食','自然风光','历史遗迹'],mustSee:{},themes:{default:['城市初探','文化深探','休闲漫游','美食购物','自由探索']},hotelAreas:{}};
}

var STYLE_THEMES = {
  '轻松型':['慢游初探','随心漫步','无压力闲逛','度假放空','温柔收尾'],
  '经典型':['城市精华日','必打卡景点','文化经典游','深入探索','购物留念'],
  '深度型':['深度文化沉浸','本地人视角','专题聚焦','巷弄寻宝','珍藏记忆'],
  '高端度假型':['奢华体验日','私人定制日','精品慢活','Fine Dining之夜','悠然离别'],
  '亲子型':['亲子欢乐初探','儿童主题日','自然科学探索','互动家庭日','轻松收尾'],
};
function smartTheme(i, total, style, prefs, db) {
  if (i===0) return '✈️ 抵达 · 城市初印象';
  if (i===total-1) return '🛍 自由购物 · 踏上归途';
  var pref=prefs&&prefs[0]?prefs[0]:'';
  var prefPool=(db.themes&&db.themes[pref])?db.themes[pref]:(db.themes&&db.themes['default']?db.themes['default']:[]);
  var stylePool=STYLE_THEMES[style]||STYLE_THEMES['经典型'];
  var pool=prefPool.concat(stylePool);
  return pool[(i-1)%pool.length]||stylePool[(i-1)%stylePool.length];
}

// ─────────────────────────────────────────────
// RUSH ANALYSIS
// ─────────────────────────────────────────────
function analyzeRush(day, style) {
  var text=[day.morning||'',day.afternoon||'',day.evening||'',day.note||''].join(' ');
  var commas=(text.match(/[，,、；;]/g)||[]).length;
  var longTravel=/新干线|高铁|飞机|渡轮|长途|转场|换城/.test(text);
  var cityChange=day.city!==day.hotel;
  var score=0;
  if(commas>7) score+=2; else if(commas>4) score+=1;
  if(longTravel&&commas>3) score+=1;
  if(cityChange) score+=1;
  if(['轻松型','高端度假型','亲子型'].indexOf(style)>=0&&score>=1) score+=1;
  if(score===0) return {level:'ok',label:'节奏适中',tip:''};
  if(score<=1) return {level:'warn',label:'略显紧张',tip:'可考虑减少1个景点'};
  return {level:'danger',label:'⚠ 行程过赶',tip:'景点过多或含长途转场，建议精简'};
}

function generateItinerary(form) {
  var db=getDB(form.destination);
  var days=Math.max(1,parseInt(form.days)||7);
  var cities=db.cities||[form.destination];
  var route;
  if(days<=3) route=[cities[0]];
  else if(days<=5) route=cities.slice(0,2);
  else if(days<=8) route=cities.slice(0,3);
  else route=cities.slice(0,4);

  var dayCities=[];
  var dpc=Math.floor(days/route.length);
  for(var ci=0;ci<route.length;ci++){
    var cnt=ci===route.length-1?days-dayCities.length:dpc;
    for(var j=0;j<cnt;j++) dayCities.push(route[ci]);
  }

  var sd=form.startDate?new Date(form.startDate):new Date();
  var result=[];
  for(var i=0;i<days;i++){
    var d=new Date(sd); d.setDate(sd.getDate()+i);
    var city=dayCities[i]||form.destination;
    var allAttrs=(db.mustSee&&db.mustSee[city])?db.mustSee[city]:
      (db.mustSee&&Object.keys(db.mustSee).length>0?db.mustSee[Object.keys(db.mustSee)[0]]:['当地景点']);
    var attrs=form.avoidPlaces?allAttrs.filter(function(a){return a.indexOf(form.avoidPlaces.trim())<0;}):allAttrs;
    if(!attrs.length) attrs=allAttrs;
    var isFirst=i===0,isLast=i===days-1;
    var pref=form.preferences&&form.preferences[0]?form.preferences[0]:'';
    var theme=smartTheme(i,days,form.style,form.preferences,db);
    var a1=(form.mustSee&&i===1)?form.mustSee:(attrs[i%Math.max(attrs.length,1)]||'当地特色景点');
    var a2=attrs[(i+1)%Math.max(attrs.length,1)]||'周边街区';
    var morning,afternoon,evening,note;

    if(isFirst){
      morning='航班抵达'+city+'，办理入境，前往酒店 check-in';
      afternoon='稍作休整后步行探索酒店附近，感受'+city+'第一印象';
      evening=pref==='蜜月'?'烛光晚餐，开启甜蜜'+form.destination+'之旅 ❤️':'前往当地知名餐厅，品尝地道'+form.destination+'美食';
      note='建议提前网上值机；到达后先休息调时差，首日不排重度行程';
    } else if(isLast){
      morning='酒店早餐后整理行李，退房行李寄存，最后自由时光';
      afternoon=pref==='购物'?'最后的免税店/商圈扫货，采购特产伴手礼':'轻松逛逛周边，购买特产';
      evening='前往机场，办理值机手续，搭乘航班返回'+form.departure;
      note='请提前3小时到机场；注意液体物品规定；确认手提行李尺寸';
    } else {
      morning='出发前往'+a1+(pref==='摄影'?'，把握晨光黄金摄影时段':'');
      if(['轻松型','高端度假型'].indexOf(form.style)>=0){
        afternoon='漫步'+a2+'附近，随心探索，不赶时间';
      } else {
        afternoon='游览'+a2+(pref==='购物'?'，逛附近商圈':'')+(pref==='美食'?'，探访当地特色小食':'');
      }
      evening=pref==='美食'?'前往'+city+'知名夜市或餐厅，深度感受当地风味'
             :pref==='蜜月'?'浪漫晚餐，漫步夜景区，享受两人时光 ✨'
             :'自由安排，可前往夜市或早归休息';
      note=form.style==='深度型'?'建议提前预约导览；参观前研究景点背景更有深度'
          :'景点开放时间出发前再次确认；热门景点避开正午';
    }
    result.push({
      id:'d'+(i+1)+'-'+Math.random().toString(36).slice(2,6),
      day:i+1,
      date:d.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'}),
      city:city,theme:theme,morning:morning,afternoon:afternoon,evening:evening,
      transport:form.transport,hotel:city,note:note,
    });
  }

  var ed=new Date(sd); ed.setDate(sd.getDate()+days-1);
  var slbl={轻松型:'漫游',经典型:'经典',深度型:'深度探索',高端度假型:'奢享',亲子型:'亲子'}[form.style]||'';
  var aud=(form.adults>0&&form.children>0)?form.adults+'大'+form.children+'小亲子家庭'
         :(form.preferences&&form.preferences.indexOf('蜜月')>=0)?'蜜月情侣':form.adults+'位旅行者';
  var overview={
    title:form.destination+' '+days+'日'+slbl+'之旅',
    dateRange:sd.toLocaleDateString('zh-CN')+' — '+ed.toLocaleDateString('zh-CN'),
    route:form.departure+' → '+route.join(' → ')+' → '+form.departure,
    audience:aud,
    highlights:(db.highlights||[]).slice(0,5),
  };
  var designNotes={
    route:'以'+route.join('→')+'为主轴，'+days+'天覆盖'+form.destination+'最具代表性区域，减少无效转场。',
    hotel:'住宿选择'+route.map(function(c){return(db.hotelAreas&&db.hotelAreas[c])||c+'市中心';}).join('、')+'区域，步行可达核心景区。',
    pacing:'风格定为「'+form.style+'」，'+({轻松型:'每日≤2个主要景点，保留充足自由时间',经典型:'平衡必打卡与自由活动，核心不遗漏',深度型:'聚焦1-2主题深入，搭配专业导览',高端度假型:'以精品酒店为中心辐射，强调品质',亲子型:'严格控制节奏，保证儿童午休'}[form.style]||'')+'。',
    match:'充分考虑「'+(form.preferences&&form.preferences.length?form.preferences.join('/'):'无特殊')+'」偏好'+(form.mustSee?'，将"'+form.mustSee+'"列为重点':'')+'。',
  };
  return {overview:overview,days:result,designNotes:designNotes,clientMsg:buildClientMsg(form,overview,result,db)};
}

function buildClientMsg(form,ov,days,db){
  var g=(form.preferences&&form.preferences.indexOf('蜜月')>=0)
    ?'亲爱的，为您和另一半精心设计了这份 '+form.days+' 天'+form.destination+'蜜月行程 💕'
    :form.children>0
    ?'您好！为您全家定制了这份 '+form.days+' 天'+form.destination+'亲子行程 🌟'
    :'您好！根据您的需求，为您量身定制了这份 '+form.days+' 天'+form.destination+'行程 ✈️';
  var sd={轻松型:'全程节奏宽松，无需赶路',经典型:'精选经典必游，高效不遗漏',深度型:'深度沉浸，超越普通游客的体验',高端度假型:'精品住宿+私人安排，每个细节都是享受',亲子型:'专为家庭设计，大人孩子都轻松开心'}[form.style]||'';
  var hls=(db.highlights||[]).slice(0,3).join('、');
  var dayList=days.map(function(d){return 'Day'+d.day+'  '+d.city+' | '+d.theme;}).join('\n');
  return g+'\n\n📍 行程概览\n路线：'+ov.route+'\n日期：'+ov.dateRange+'\n人数：成人 '+form.adults+' 人'+(form.children>0?'，儿童 '+form.children+' 人':'')+'\n\n✨ 行程亮点\n• '+sd+'\n• 精选体验：'+hls+'\n• 住宿安排在核心区域，交通便利\n• 全程'+form.transport+'，舒适省心\n\n📅 行程一览\n'+dayList+'\n\n以上是初步方案，如有任何想法欢迎随时告诉我 🙌';
}

function buildFullText(it){
  var ov=it.overview;
  var lines=['【'+ov.title+'】','','━━━ 行程总览 ━━━','日期：'+ov.dateRange,'路线：'+ov.route,'适合：'+ov.audience,'亮点：'+ov.highlights.join('、'),'','━━━ 每日行程 ━━━'];
  it.days.forEach(function(d){
    lines.push('','Day '+d.day+'  '+d.date+'  '+d.city,'主题：'+d.theme,'上午：'+d.morning,'下午：'+d.afternoon,'晚上：'+d.evening,'交通：'+d.transport+'  住宿：'+d.hotel);
    if(d.note) lines.push('备注：'+d.note);
  });
  lines.push('','━━━ 设计思路（内部）━━━',it.designNotes.route,it.designNotes.hotel,it.designNotes.pacing,it.designNotes.match);
  return lines.join('\n');
}

// COPY UTIL  (clipboard + fallback)
// ─────────────────────────────────────────────
function useCopy(getText){
  var s=useState(false); var done=s[0]; var setDone=s[1];
  var go=function(){
    var t=typeof getText==='function'?getText():getText;
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(t).then(function(){setDone(true);setTimeout(function(){setDone(false);},2000);});
    } else {
      var ta=document.createElement('textarea');
      ta.value=t;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.focus();ta.select();
      try{document.execCommand('copy');}catch(e){}
      document.body.removeChild(ta);
      setDone(true);setTimeout(function(){setDone(false);},2000);
    }
  };
  return {done:done,go:go};
}

function TagPicker(props){
  var options=props.options,value=props.value,onChange=props.onChange,multi=props.multi!==false;
  function toggle(opt){
    if(!multi){onChange(opt===value?'':opt);return;}
    if(value.indexOf(opt)>=0) onChange(value.filter(function(v){return v!==opt;}));
    else onChange(value.concat([opt]));
  }
  return h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px'}},
    options.map(function(opt){
      var active=multi?value.indexOf(opt)>=0:value===opt;
      return h('span',{key:opt,onClick:function(){toggle(opt);},style:{
        padding:'3px 10px',borderRadius:'4px',fontSize:'12px',cursor:'pointer',userSelect:'none',
        border:'1px solid',transition:'all .12s',
        background:active?C.tagActiveBg:'#f8fafc',
        borderColor:active?C.tagActiveBorder:C.border,
        color:active?C.tagActiveText:C.textMid,
        fontWeight:active?'500':'400',
      }},opt);
    })
  );
}

// ─────────────────────────────────────────────
// EXPORT WORD (.docx)
// ─────────────────────────────────────────────
function exportDocx(it, form) {
  try {
    var docx = window.docx;
    var Document    = docx.Document;
    var Packer      = docx.Packer;
    var Paragraph   = docx.Paragraph;
    var TextRun     = docx.TextRun;
    var Table       = docx.Table;
    var TableRow    = docx.TableRow;
    var TableCell   = docx.TableCell;
    var PageBreak   = docx.PageBreak;
    var AlignmentType  = docx.AlignmentType;
    var BorderStyle    = docx.BorderStyle;
    var WidthType      = docx.WidthType;
    var ShadingType    = docx.ShadingType;
    var HeadingLevel   = docx.HeadingLevel;
    var VerticalAlign  = docx.VerticalAlign;

    var ov = it.overview;

    // ── shared border style ──
    var bSingle = {style: BorderStyle.SINGLE, size: 4, color: '94a3b8'};
    var cellBorders = {top:bSingle, bottom:bSingle, left:bSingle, right:bSingle};
    var noBorder = {style: BorderStyle.NONE, size: 0, color: 'ffffff'};
    var noBorders = {top:noBorder, bottom:noBorder, left:noBorder, right:noBorder};

    // ── column widths (A4, 2cm margins each side → content ≈ 8892 DXA) ──
    var TW = 8892; // total table width
    var LW = 1700; // label column
    var VW = TW - LW; // value column

    // cell margin
    var CM = {top:80, bottom:80, left:120, right:120};

    function p(text, opts) {
      opts = opts || {};
      return new Paragraph({
        alignment: opts.align || AlignmentType.LEFT,
        spacing: {before: opts.before||0, after: opts.after||120},
        children: [new TextRun({
          text: text || '',
          bold: opts.bold || false,
          size: opts.size || 22,
          font: 'Arial',
          color: opts.color || '1e293b',
        })]
      });
    }

    function pEmpty(spacing) {
      return new Paragraph({spacing:{before:0,after:spacing||120},children:[]});
    }

    function heading1(text) {
      return new Paragraph({
        spacing: {before:360, after:160},
        border: {bottom: {style:BorderStyle.SINGLE, size:6, color:'0ea5e9', space:1}},
        children: [new TextRun({text:text, bold:true, size:32, font:'Arial', color:'0369a1'})]
      });
    }

    function heading2(text) {
      return new Paragraph({
        spacing: {before:240, after:100},
        children: [new TextRun({text:text, bold:true, size:26, font:'Arial', color:'1e293b'})]
      });
    }

    function labelCell(text) {
      return new TableCell({
        borders: cellBorders,
        width: {size:LW, type:WidthType.DXA},
        margins: CM,
        shading: {fill:'f0f9ff', type:ShadingType.CLEAR},
        verticalAlign: VerticalAlign.TOP,
        children: [new Paragraph({children:[new TextRun({text:text||'', bold:true, size:20, font:'Arial', color:'0369a1'})]})]
      });
    }

    function valueCell(text, colWidth) {
      return new TableCell({
        borders: cellBorders,
        width: {size:colWidth||VW, type:WidthType.DXA},
        margins: CM,
        verticalAlign: VerticalAlign.TOP,
        children: [new Paragraph({children:[new TextRun({text:text||'', size:20, font:'Arial', color:'1e293b'})]})]
      });
    }

    function twoColRow(label, value) {
      return new TableRow({children:[labelCell(label), valueCell(value)]});
    }

    function makeDayTable(day) {
      var rows = [
        twoColRow('日期', day.date || ('第'+day.day+'天')),
        twoColRow('城市', day.city || ''),
        twoColRow('今日主题', day.theme || ''),
        twoColRow('上午安排', day.morning || ''),
        twoColRow('下午安排', day.afternoon || ''),
        twoColRow('晚上安排', day.evening || ''),
        twoColRow('交通方式', day.transport || ''),
        twoColRow('住宿', day.hotel || ''),
        twoColRow('备注', day.note || ''),
      ];
      return new Table({
        width: {size:TW, type:WidthType.DXA},
        columnWidths: [LW, VW],
        rows: rows,
      });
    }

    // ── build sections ──
    var children = [];

    // ════════ 封面 ════════
    children.push(pEmpty(1440));
    children.push(new Paragraph({
      alignment: AlignmentType.CENTER,
      spacing: {before:0, after:240},
      children: [new TextRun({text:'✈  旅行定制路书', bold:true, size:52, font:'Arial', color:'0ea5e9'})]
    }));
    children.push(new Paragraph({
      alignment: AlignmentType.CENTER,
      spacing: {before:0, after:480},
      children: [new TextRun({text:ov.title || '', bold:true, size:40, font:'Arial', color:'0369a1'})]
    }));

    // cover info table (no borders, centered)
    var coverInfoRows = [
      ['📅 日期', ov.dateRange || ''],
      ['📍 路线', ov.route || ''],
      ['👥 出行人', ov.audience || ''],
    ];
    var coverCW = [1800, TW - 1800];
    children.push(new Table({
      width: {size:TW, type:WidthType.DXA},
      columnWidths: coverCW,
      rows: coverInfoRows.map(function(r) {
        return new TableRow({children:[
          new TableCell({borders:noBorders, width:{size:coverCW[0],type:WidthType.DXA}, margins:CM,
            children:[new Paragraph({children:[new TextRun({text:r[0], bold:true, size:22, font:'Arial', color:'475569'})]})]
          }),
          new TableCell({borders:noBorders, width:{size:coverCW[1],type:WidthType.DXA}, margins:CM,
            children:[new Paragraph({children:[new TextRun({text:r[1], size:22, font:'Arial', color:'1e293b'})]})]
          }),
        ]});
      })
    }));
    children.push(pEmpty(400));
    children.push(new Paragraph({
      alignment: AlignmentType.CENTER,
      spacing: {before:0, after:0},
      children: [new TextRun({text:'定制服务 · 专属行程', size:20, font:'Arial', color:'94a3b8'})]
    }));

    // page break after cover
    children.push(new Paragraph({children:[new PageBreak()]}));

    // ════════ 行程总览 ════════
    children.push(heading1('行程总览'));
    children.push(pEmpty(80));

    var summaryRows = [
      twoColRow('路线概览', ov.route || ''),
      twoColRow('行程亮点', (ov.highlights||[]).join('  ·  ')),
      twoColRow('适合人群', ov.audience || ''),
    ];
    children.push(new Table({
      width:{size:TW,type:WidthType.DXA},
      columnWidths:[LW,VW],
      rows: summaryRows,
    }));

    children.push(new Paragraph({children:[new PageBreak()]}));

    // ════════ 每日行程 ════════
    children.push(heading1('每日行程详情'));

    it.days.forEach(function(day) {
      children.push(pEmpty(180));
      // Day header
      children.push(new Paragraph({
        spacing:{before:0, after:100},
        children:[
          new TextRun({text:'Day ' + day.day + '   ', bold:true, size:26, font:'Arial', color:'0ea5e9'}),
          new TextRun({text:(day.date||'') + '   ' + (day.city||''), size:22, font:'Arial', color:'475569'}),
        ]
      }));
      children.push(makeDayTable(day));
    });

    children.push(new Paragraph({children:[new PageBreak()]}));

    // ════════ 行程设计思路 ════════
    children.push(heading1('行程设计思路'));
    children.push(pEmpty(80));

    var notes = it.designNotes || {};
    var noteItems = [
      ['路线规划', notes.route || ''],
      ['住宿安排', notes.hotel || ''],
      ['节奏控制', notes.pacing || ''],
      ['需求匹配', notes.match || ''],
    ];
    children.push(new Table({
      width:{size:TW,type:WidthType.DXA},
      columnWidths:[LW,VW],
      rows: noteItems.map(function(r){return twoColRow(r[0], r[1]);}),
    }));

    children.push(pEmpty(240));
    children.push(new Paragraph({
      alignment: AlignmentType.RIGHT,
      spacing:{before:0,after:0},
      children:[new TextRun({text:'本路书由旅行定制师专属生成 · 版权归属定制服务方', size:18, font:'Arial', color:'cbd5e1'})]
    }));

    // ── build document ──
    var doc = new Document({
      styles: {
        default: {
          document: {run:{font:'Arial', size:22, color:'1e293b'}},
        }
      },
      sections: [{
        properties: {
          page: {
            size: {width:11906, height:16838},
            margin: {top:1134, right:1134, bottom:1134, left:1134},
          }
        },
        children: children,
      }]
    });

    // ── pack & download ──
    Packer.toBlob(doc).then(function(blob) {
      var today = new Date().toISOString().split('T')[0];
      var filename = (ov.title || '行程路书') + '_' + today + '.docx';
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      setTimeout(function(){URL.revokeObjectURL(url);}, 3000);
    }).catch(function(e){
      console.error('Word导出失败:', e);
      alert('Word导出失败，请检查控制台错误信息。');
    });

  } catch(e) {
    console.error('Word导出错误:', e);
    alert('Word导出出错：' + e.message);
  }
}

            h('div',{style:{flex:1,overflowY:'auto',padding:'14px 16px',background:C.bg}},
              tab==='days'?h('div',null,
                h(OverviewBar,{ov:it.overview,setOv:function(ov){setIt(function(p){return Object.assign({},p,{overview:ov});});}}),
                h(RushBar,{days:it.days,style:form.style}),
                h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}},
                  h('span',{style:{fontSize:'11px',color:C.textSub,fontFamily:FM}},'共 '+it.days.length+' 天 · 所有字段可直接编辑 · ↑↓ 调整顺序'),
                  h('button',{onClick:function(){addDayAfter(it.days.length-1);},style:{
                    display:'flex',alignItems:'center',gap:'4px',background:'none',border:'none',
                    cursor:'pointer',color:C.accent,fontSize:'12px',fontFamily:F,padding:'3px 6px',borderRadius:'4px',fontWeight:'500',
                  }},'+ 末尾新增一天')
                ),
                it.days.map(function(day,idx){
                  return h(DayCard,{key:day.id,day:day,idx:idx,total:it.days.length,style:form.style,
                    onUpdate:updateDay,onDelete:deleteDay,
                    onMoveUp:function(i){moveDay(i,-1);},
                    onMoveDown:function(i){moveDay(i,1);},
                    onAddAfter:addDayAfter,
                  });
                })
              ):
              tab==='client'?h(ClientPanel,{msg:it.clientMsg,setMsg:function(m){setIt(function(p){return Object.assign({},p,{clientMsg:m});});}}) :
              tab==='audit'?h(AuditPanel,{it:it,form:form}):
              h(NotesPanel,{notes:it.designNotes})
            )
          )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
