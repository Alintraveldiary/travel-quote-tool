<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行报价工具 v5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1a1a;--paper:#f5f0e8;--cream:#ede8dc;--accent:#c8562a;
  --accent-light:#e8c4b4;--border:#c8bfad;--muted:#7a7060;--white:#fdfaf5;
  --green:#2d6a4f;--green-bg:#d8f3dc;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Noto Serif SC',serif;min-height:100vh}
header{background:var(--ink);color:var(--paper);padding:14px 28px;display:flex;align-items:baseline;gap:14px;border-bottom:3px solid var(--accent)}
header h1{font-size:1.05rem;font-weight:600;letter-spacing:.06em}
header span{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--accent-light);letter-spacing:.1em}

.workspace{display:grid;grid-template-columns:480px 1fr;min-height:calc(100vh - 52px)}
.form-panel{background:var(--white);border-right:1px solid var(--border);padding:18px 22px 60px;overflow-y:auto}
.preview-panel{padding:24px 30px;overflow-y:auto}

.section-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.2em;color:var(--accent);
  text-transform:uppercase;margin:18px 0 7px;padding-bottom:4px;border-bottom:1px solid var(--accent-light)}
.section-label:first-child{margin-top:0}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.field-row.full{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:3px}
label{font-size:.65rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.05em}
input,select,textarea{background:var(--cream);border:1px solid var(--border);border-radius:2px;
  padding:6px 8px;font-family:'Noto Serif SC',serif;font-size:.82rem;color:var(--ink);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--white)}
textarea{resize:vertical;min-height:50px;line-height:1.5}
input[readonly]{background:var(--paper);color:var(--muted);font-family:'DM Mono',monospace}

/* Auto badge */
.auto-badge{display:none;background:var(--green-bg);color:var(--green);font-family:'DM Mono',monospace;
  font-size:.6rem;padding:2px 7px;border-radius:2px;border:1px solid #95d5b2;margin-bottom:5px}
.auto-badge.show{display:block}

/* Cost module */
.cost-module{border:1px solid var(--border);border-radius:3px;margin-bottom:8px;overflow:hidden}
.mod-header{display:flex;align-items:center;justify-content:space-between;
  background:var(--cream);padding:7px 11px;cursor:pointer;user-select:none;gap:8px}
.mod-header .mod-title{font-size:.8rem;font-weight:600;color:var(--ink);flex:1}
.mod-header .mod-result{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--accent);font-weight:600;white-space:nowrap}
.mod-header .mod-toggle{font-size:.75rem;color:var(--muted);transition:transform .2s;flex-shrink:0}
.mod-header.open .mod-toggle{transform:rotate(180deg)}
.mod-body{padding:10px 10px 12px;display:none}
.mod-body.open{display:block}

/* Generic item list — used by ALL modules */
.item-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.item-row{display:grid;gap:5px;align-items:center;
  background:var(--paper);border:1px solid var(--border);border-radius:2px;padding:5px 8px}
.item-row input,.item-row select{font-size:.8rem;padding:4px 6px}
.item-row .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;
  padding:0 3px;flex-shrink:0}
.item-row .del-btn:hover{color:var(--accent)}
.item-row .row-label{font-size:.78rem;color:var(--muted);white-space:nowrap}
.item-row .cny-preview{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--green);white-space:nowrap}

/* Add-row controls at bottom of each module */
.add-controls{display:flex;gap:6px;flex-wrap:wrap}
.add-controls input,.add-controls select{flex:1;min-width:80px}
.btn-add{background:var(--ink);color:#fff;border:none;border-radius:2px;padding:6px 12px;
  font-family:'DM Mono',monospace;font-size:.68rem;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-add:hover{opacity:.85}

.mod-subtotal{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);
  text-align:right;padding-top:6px;border-top:1px dashed var(--border);margin-top:2px}

/* Summary */
.summary-box{background:var(--ink);border-radius:3px;padding:13px 16px;margin:16px 0 5px;color:#fff}
.summary-box .grand-label{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--accent-light);letter-spacing:.12em;margin-bottom:3px}
.summary-box .grand-total{font-size:1.65rem;font-weight:600}
.summary-box .grand-sub{font-family:'DM Mono',monospace;font-size:.67rem;color:#9a9080;margin-top:5px;line-height:1.6}
.per-pax{background:var(--accent-light);border-radius:2px;padding:6px 11px;font-size:.77rem;color:var(--accent);font-weight:600;margin-bottom:14px}

/* Buttons */
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.btn-primary{cursor:pointer;border:none;border-radius:2px;padding:9px 16px;
  font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.07em;background:var(--accent);color:#fff;flex:1}
.btn-secondary{cursor:pointer;border:1px solid var(--border);border-radius:2px;padding:9px 14px;
  font-family:'DM Mono',monospace;font-size:.72rem;background:var(--cream);color:var(--ink)}
.btn-primary:hover,.btn-secondary:hover{opacity:.85}

/* Quote card */
.preview-header{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
.quote-card{background:var(--white);border:1px solid var(--border);border-top:4px solid var(--accent);max-width:600px;padding:28px 32px;position:relative}
.quote-card .co-name{font-size:.65rem;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px}
.quote-card h2{font-size:1.15rem;font-weight:600;margin-bottom:16px;border-bottom:1px solid var(--cream);padding-bottom:11px}
.quote-date{position:absolute;top:26px;right:30px;font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px 18px;margin-bottom:16px}
.info-item .key{font-size:.58rem;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.info-item .val{font-size:.85rem}
.svc-block{background:var(--cream);border-left:3px solid var(--accent);padding:8px 12px;margin-bottom:14px;font-size:.82rem;line-height:1.6;white-space:pre-wrap}
.cost-table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:.8rem}
.cost-table thead tr{background:var(--cream)}
.cost-table th{text-align:left;padding:5px 8px;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.08em;color:var(--muted);font-weight:400;border-bottom:1px solid var(--border)}
.cost-table td{padding:5px 8px;border-bottom:1px dashed var(--border);vertical-align:middle}
.cost-table td.num{text-align:right;font-family:'DM Mono',monospace;font-size:.78rem;white-space:nowrap}
.cost-table tr.cat-hdr td{background:var(--cream);font-size:.7rem;color:var(--muted);padding:4px 8px;border-bottom:1px solid var(--border)}
.cost-table tr.grand td{background:var(--ink);color:#fff;font-weight:600;border-bottom:none;padding:8px}
.cost-table tr.grand td.num{color:var(--accent-light)}
.qperpax{background:var(--accent-light);border-radius:2px;padding:7px 12px;font-size:.8rem;color:var(--accent);font-weight:600;margin-bottom:12px}
.qnotes{font-size:.72rem;color:var(--muted);line-height:1.7;border-top:1px solid var(--cream);padding-top:11px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:240px;color:var(--muted);gap:8px}
.empty-state .icon{font-size:2rem;opacity:.3}
.empty-state p{font-size:.75rem;font-family:'DM Mono',monospace;letter-spacing:.07em}

/* Ticket dropdown row */
.ticket-db-row{display:flex;gap:6px;margin-bottom:6px}
.ticket-db-row select{flex:1}
</style>
</head>
<body>
<header>
  <h1>旅行定制报价工具</h1>
  <span>CUSTOM TRAVEL · QUOTATION v5</span>
</header>
<div class="workspace">

<!-- ════════ FORM ════════ -->
<div class="form-panel">

  <div class="section-label">行程基本信息</div>
  <div class="field-row">
    <div class="field"><label>出发日期</label><input type="date" id="dateStart"></div>
    <div class="field"><label>结束日期</label><input type="date" id="dateEnd"></div>
  </div>
  <div class="field-row">
    <div class="field"><label>城市 / 区域</label><input type="text" id="city" placeholder="哥本哈根" oninput="onCityInput()"></div>
    <div class="field"><label>出行人数</label><input type="number" id="pax" min="1" value="2" oninput="calcAll()"></div>
  </div>
  <div class="field-row">
    <div class="field"><label>行程天数</label><input type="number" id="days" value="1" min="1" oninput="calcAll()"></div>
    <div class="field"><label>季节</label>
      <select id="season" onchange="tryAutoFill()">
        <option value="off">淡季</option>
        <option value="peak">旺季</option>
      </select>
    </div>
  </div>
  <div class="field-row">
    <div class="field"><label>汇率 EUR→CNY</label><input type="number" id="fxRate" value="8.3" step="0.01" oninput="calcAll()"></div>
    <div class="field"><label>加价系数</label><input type="number" id="markup" value="1.35" step="0.01" oninput="calcAll()"></div>
  </div>
  <div class="field-row full">
    <div class="field"><label>服务说明（报价单显示）</label>
      <textarea id="service" rows="2" placeholder="全程私家包车，含专业司导，每日8-10小时用车…"></textarea>
    </div>
  </div>

  <div class="section-label">费用明细</div>

  <!-- ── 1. 包车 ── -->
  <div class="cost-module">
    <div class="mod-header open" onclick="toggleMod(this)">
      <span class="mod-title">🚐 包车费用</span>
      <span class="mod-result" id="r-car">—</span>
      <span class="mod-toggle">▾</span>
    </div>
    <div class="mod-body open">
      <div class="auto-badge" id="autoBadge"></div>
      <div class="item-list" id="list-car"></div>
      <!-- add controls -->
      <div class="add-controls">
        <select id="in-car-type">
          <option value="benz">奔驰商务 V-Class</option>
          <option value="small">5座豪华轿车</option>
          <option value="custom">自定义车型</option>
        </select>
        <input type="text" id="in-car-custom" placeholder="车型名" style="display:none;max-width:100px">
        <input type="text" id="in-car-city" placeholder="城市" style="max-width:90px">
        <input type="number" id="in-car-eur" placeholder="€/天" min="0" step="1" style="max-width:70px">
        <input type="number" id="in-car-days" placeholder="天" min="1" value="1" style="max-width:50px">
        <button class="btn-add" onclick="addCarItem()">+ 添加</button>
      </div>
      <div class="mod-subtotal" id="sub-car"></div>
    </div>
  </div>

  <!-- ── 2. 接送机 ── -->
  <div class="cost-module">
    <div class="mod-header" onclick="toggleMod(this)">
      <span class="mod-title">✈️ 接送机</span>
      <span class="mod-result" id="r-transfer">—</span>
      <span class="mod-toggle">▾</span>
    </div>
    <div class="mod-body">
      <div class="item-list" id="list-transfer"></div>
      <div class="add-controls">
        <select id="in-transfer-type">
          <option value="接机">接机</option>
          <option value="送机">送机</option>
          <option value="接送机（往返）">接送机（往返）</option>
        </select>
        <input type="text" id="in-transfer-city" placeholder="城市" style="max-width:90px">
        <input type="number" id="in-transfer-eur" placeholder="€" min="0" step="1" style="max-width:70px">
        <button class="btn-add" onclick="addTransferItem()">+ 添加</button>
      </div>
      <div class="mod-subtotal" id="sub-transfer"></div>
    </div>
  </div>

  <!-- ── 3. 门票 ── -->
  <div class="cost-module">
    <div class="mod-header" onclick="toggleMod(this)">
      <span class="mod-title">🎟 景点门票</span>
      <span class="mod-result" id="r-ticket">—</span>
      <span class="mod-toggle">▾</span>
    </div>
    <div class="mod-body">
      <!-- from DB -->
      <div class="ticket-db-row">
        <select id="ticketSelect"><option value="">— 价格库选景点 —</option></select>
        <button class="btn-add" onclick="addTicketFromDB()">+ 选入</button>
      </div>
      <div class="item-list" id="list-ticket"></div>
      <!-- manual add -->
      <div class="add-controls">
        <input type="text" id="in-ticket-name" placeholder="景点名称" style="flex:2">
        <input type="number" id="in-ticket-eur" placeholder="€/人" min="0" step="0.5" style="max-width:70px">
        <input type="number" id="in-ticket-qty" placeholder="人数" min="1" style="max-width:55px">
        <button class="btn-add" onclick="addTicketManual()">+ 填加</button>
      </div>
      <div class="mod-subtotal" id="sub-ticket"></div>
    </div>
  </div>

  <!-- ── 4. 住宿费 ── -->
  <div class="cost-module">
    <div class="mod-header" onclick="toggleMod(this)">
      <span class="mod-title">🏨 司导住宿费</span>
      <span class="mod-result" id="r-hotel">—</span>
      <span class="mod-toggle">▾</span>
    </div>
    <div class="mod-body">
      <div class="item-list" id="list-hotel"></div>
      <div class="add-controls">
        <input type="text" id="in-hotel-city" placeholder="城市/说明" style="flex:2">
        <input type="number" id="in-hotel-eur" placeholder="€/晚" min="0" step="5" style="max-width:70px">
        <input type="number" id="in-hotel-nights" placeholder="晚数" min="1" value="1" style="max-width:55px">
        <button class="btn-add" onclick="addHotelItem()">+ 添加</button>
      </div>
      <div class="mod-subtotal" id="sub-hotel"></div>
    </div>
  </div>

  <!-- ── 5. 空返费 ── -->
  <div class="cost-module">
    <div class="mod-header" onclick="toggleMod(this)">
      <span class="mod-title">🔄 空返费</span>
      <span class="mod-result" id="r-deadhead">—</span>
      <span class="mod-toggle">▾</span>
    </div>
    <div class="mod-body">
      <div class="item-list" id="list-deadhead"></div>
      <div class="add-controls">
        <input type="text" id="in-dh-desc" placeholder="说明（如：巴黎→尼斯）" style="flex:2">
        <select id="in-dh-count" style="max-width:90px">
          <option value="0.5">0.5 段</option>
          <option value="1" selected>1 段</option>
          <option value="1.5">1.5 段</option>
          <option value="2">2 段</option>
        </select>
        <input type="number" id="in-dh-eur" placeholder="€/段" min="0" step="10" style="max-width:70px">
        <button class="btn-add" onclick="addDeadheadItem()">+ 添加</button>
      </div>
      <div class="mod-subtotal" id="sub-deadhead"></div>
    </div>
  </div>

  <!-- ── 6. 服务费 ── -->
  <div class="cost-module">
    <div class="mod-header open" onclick="toggleMod(this)">
      <span class="mod-title">⭐ 服务费</span>
      <span class="mod-result" id="r-service">—</span>
      <span class="mod-toggle">▾</span>
    </div>
    <div class="mod-body open">
      <div class="field-row">
        <div class="field"><label>费率（¥/人/天）</label>
          <input type="number" id="svcRate" value="100" min="0" step="10" oninput="calcAll()">
        </div>
        <div class="field"><label>计算结果</label>
          <input type="text" id="svcDisplay" readonly>
        </div>
      </div>
      <div class="mod-subtotal" id="sub-service"></div>
    </div>
  </div>

  <!-- 汇总 -->
  <div class="summary-box">
    <div class="grand-label">总报价（人民币）</div>
    <div class="grand-total" id="grandTotal">¥ —</div>
    <div class="grand-sub" id="grandSub"></div>
  </div>
  <div class="per-pax" id="perPax" style="display:none"></div>

  <div class="section-label">附注</div>
  <div class="field-row full">
    <div class="field"><label>报价备注</label>
      <textarea id="notes" rows="2" placeholder="含税，不含小费；有效期7天…"></textarea>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn-primary" onclick="generateQuote()">生成报价单 →</button>
    <button class="btn-secondary" onclick="clearForm()">清空</button>
  </div>
</div>

<!-- ════════ PREVIEW ════════ -->
<div class="preview-panel">
  <div class="preview-header">QUOTE PREVIEW · 报价预览</div>
  <div id="quoteOutput">
    <div class="empty-state"><div class="icon">✦</div><p>填写左侧信息后点击生成报价单</p></div>
  </div>
</div>
</div>

<script>
// ══════════════════════════════════════
// Price DB (embedded)

// Helpers

const $  = id => document.getElementById(id);
const num = id => parseFloat($(id)?.value) || 0;
const int = id => parseInt($(id)?.value)   || 0;
const fx  = () => num('fxRate') || 8.3;
const mu  = () => num('markup') || 1.35;
const conv = eur => Math.ceil(eur * mu() * fx());
const fmtC = n => n > 0 ? '¥ ' + Math.round(n).toLocaleString('zh-CN') : '—';

// ══════════════════════════════════════
// Generic render — renders any module's item list
// ══════════════════════════════════════
function renderList(key, cols) {
  /*
    cols: [{field, label, type, width, opts}]
    Each item is displayed as a grid row with editable fields + delete
  */
  const list = $(`list-${key}`);
  list.innerHTML = '';
  const items = state[key];
  
  const colCount = cols.filter(c=>!c.hidden).length + 1; // +1 for del btn
  const templateCols = cols.filter(c=>!c.hidden).map(c=>c.width||'1fr').join(' ') + ' 22px';

  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.style.gridTemplateColumns = templateCols;

    cols.filter(c=>!c.hidden).forEach(col => {
      let el;
      if (col.type === 'select') {
        el = document.createElement('select');
        (col.opts||[]).forEach(([v,l]) => {
          const o = document.createElement('option');
          o.value = v; o.textContent = l;
          if (item[col.field] == v) o.selected = true;
          el.appendChild(o);
        });
      } else {
        el = document.createElement('input');
        el.type = col.type || 'text';
        el.placeholder = col.placeholder || '';
        el.value = item[col.field] ?? '';
        if (col.type === 'number') { el.min = 0; el.step = col.step||1; }
      }
      el.style.fontSize = '.8rem';
      el.style.padding = '3px 6px';
      el.addEventListener('input', () => { item[col.field] = el.type==='number' ? parseFloat(el.value)||0 : el.value; calcAll(); });
      row.appendChild(el);
    });

    // delete button
    const del = document.createElement('button');
    del.className = 'del-btn'; del.textContent = '✕';
    del.onclick = () => { state[key].splice(i, 1); renderList(key, cols); calcAll(); };
    row.appendChild(del);
    list.appendChild(row);
  });
}


// ══════════════════════════════════════
// Dedicated ticket renderer (name + eur + qty, all editable)
// ══════════════════════════════════════
function renderTickets() {
  const list = $('list-ticket');
  list.innerHTML = '';
  if (state.ticket.length === 0) return;
  state.ticket.forEach((item, idx) => {
    // outer wrapper
    const wrap = document.createElement('div');
    wrap.style.cssText = 'background:var(--paper);border:1px solid var(--border);border-radius:2px;padding:5px 8px;margin-bottom:5px';

    // row 1: name + delete
    const row1 = document.createElement('div');
    row1.style.cssText = 'display:flex;gap:5px;align-items:center;margin-bottom:4px';

    const nameEl = document.createElement('input');
    nameEl.type = 'text';
    nameEl.value = item.name;
    nameEl.placeholder = '景点名称';
    nameEl.style.cssText = 'flex:1;font-size:.8rem;padding:4px 6px;background:var(--cream);border:1px solid var(--border);border-radius:2px;color:var(--ink)';
    nameEl.addEventListener('input', () => { state.ticket[idx].name = nameEl.value; calcAll(); });

    const del = document.createElement('button');
    del.textContent = '✕';
    del.style.cssText = 'background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:0 3px;flex-shrink:0';
    del.onclick = () => { state.ticket.splice(idx, 1); renderTickets(); calcAll(); };

    row1.append(nameEl, del);

    // row 2: eur + qty + cny preview
    const row2 = document.createElement('div');
    row2.style.cssText = 'display:flex;gap:5px;align-items:center';

    const eurEl = document.createElement('input');
    eurEl.type = 'number';
    eurEl.value = item.eur;
    eurEl.placeholder = '€/人';
    eurEl.min = 0; eurEl.step = 0.5;
    eurEl.style.cssText = 'width:75px;font-size:.8rem;padding:4px 6px;background:var(--cream);border:1px solid var(--border);border-radius:2px;color:var(--ink)';
    eurEl.addEventListener('input', () => { state.ticket[idx].eur = parseFloat(eurEl.value)||0; calcAll(); updateTicketPreview(previewEl, idx); });

    const qtyEl = document.createElement('input');
    qtyEl.type = 'number';
    qtyEl.value = item.qty;
    qtyEl.placeholder = '人数';
    qtyEl.min = 1; qtyEl.step = 1;
    qtyEl.style.cssText = 'width:60px;font-size:.8rem;padding:4px 6px;background:var(--cream);border:1px solid var(--border);border-radius:2px;color:var(--ink)';
    qtyEl.addEventListener('input', () => { state.ticket[idx].qty = parseInt(qtyEl.value)||1; calcAll(); updateTicketPreview(previewEl, idx); });

    const previewEl = document.createElement('span');
    previewEl.style.cssText = 'font-family:"DM Mono",monospace;font-size:.7rem;color:var(--green);flex:1;text-align:right';
    updateTicketPreview(previewEl, idx);

    row2.append(eurEl, qtyEl, previewEl);
    wrap.append(row1, row2);
    list.appendChild(wrap);
  });
}

function updateTicketPreview(el, idx) {
  const item = state.ticket[idx];
  if (!item) return;
  const cny = conv((item.eur||0) * (item.qty||1));
  el.textContent = `€${item.eur||0}×${item.qty||1}人 → ¥${cny.toLocaleString()}`;
}

  const city = $('in-car-city').value.trim() || $('city').value.trim() || '—';
  const eur = parseFloat($('in-car-eur').value) || 0;
  const days = parseInt($('in-car-days').value) || 1;
  if (!eur) { $('in-car-eur').focus(); return; }
  state.car.push({ label: city, carTypeLabel, eur, days });
  $('in-car-city').value = ''; $('in-car-eur').value = ''; $('in-car-days').value = 1;
  renderList('car', CAR_COLS); calcAll();
}
function addTransferItem() {
  const type = $('in-transfer-type').value;
  const city = $('in-transfer-city').value.trim() || '—';
  const eur = parseFloat($('in-transfer-eur').value) || 0;
  if (!eur) { $('in-transfer-eur').focus(); return; }
  state.transfer.push({ type, city, eur });
  $('in-transfer-city').value = ''; $('in-transfer-eur').value = '';
  renderList('transfer', TRANSFER_COLS); calcAll();
}
function addTicketFromDB() {
  const sel = $('ticketSelect');
  if (!sel.value) return;
  const t = JSON.parse(sel.value);
  const pax = int('pax') || 1;
  state.ticket.push({ name: t.name, eur: t.eur, qty: pax });
  sel.value = '';
  renderTickets();
  calcAll();
}
function addTicketManual() {
  const name = $('in-ticket-name').value.trim();
  const eur = parseFloat($('in-ticket-eur').value) || 0;
  const qty = parseInt($('in-ticket-qty').value) || int('pax') || 1;
  if (!name) { $('in-ticket-name').focus(); return; }
  state.ticket.push({ name, eur, qty });
  $('in-ticket-name').value = ''; $('in-ticket-eur').value = ''; $('in-ticket-qty').value = '';
  renderTickets(); calcAll();
}
function addHotelItem() {
  const city = $('in-hotel-city').value.trim() || '—';
  const eur = parseFloat($('in-hotel-eur').value) || 0;
  const nights = parseInt($('in-hotel-nights').value) || 1;
  if (!eur) { $('in-hotel-eur').focus(); return; }
  state.hotel.push({ city, eur, nights });
  $('in-hotel-city').value = ''; $('in-hotel-eur').value = ''; $('in-hotel-nights').value = 1;
  renderList('hotel', HOTEL_COLS); calcAll();
}
function addDeadheadItem() {
  const desc = $('in-dh-desc').value.trim() || '空返';
  const count = parseFloat($('in-dh-count').value) || 1;
  const eur = parseFloat($('in-dh-eur').value) || 0;
  if (!eur) { $('in-dh-eur').focus(); return; }
  state.deadhead.push({ desc, count: String(count), eur });
  $('in-dh-desc').value = ''; $('in-dh-eur').value = '';
  renderList('deadhead', DEADHEAD_COLS); calcAll();
}

// ══════════════════════════════════════
// Auto-fill car price from DB
// ══════════════════════════════════════
function onCityInput() {
  $('autoBadge').classList.remove('show');
  tryAutoFill();
  updateTicketDropdown($('city').value.trim());
}
function tryAutoFill() {
  const city = $('city').value.trim();
  const season = $('season').value;
  const carType = $('in-car-type').value;
  if (!city) return;
  let match = null;
  for (const key of CAR_CITIES) {
    const base = key.replace(/（[^）]*）/g,'').replace(/ncc/,'').trim();
    if (key.includes(city) || city.includes(base) || base.includes(city)) { match = key; break; }
  }
  if (!match) return;
  const row = DB.car[match];
  const price = carType === 'benz'
    ? (season === 'peak' ? row.benz_peak : row.benz_off)
    : (season === 'peak' ? row.small_peak : row.small_off);
  if (price != null) {
    $('in-car-eur').value = price;
    $('in-car-city').value = city;
    const badge = $('autoBadge');
    badge.textContent = `✦ 价格库：${match} · ${carType==='benz'?'奔驰商务':'5座轿车'} · ${season==='peak'?'旺季':'淡季'} → €${price}`;
    badge.classList.add('show');
  }
}

$('in-car-type').addEventListener('change', () => {
  $('in-car-custom').style.display = $('in-car-type').value === 'custom' ? '' : 'none';
  tryAutoFill();
});

// ══════════════════════════════════════
// Ticket dropdown
// ══════════════════════════════════════
function updateTicketDropdown(city) {
  const sel = $('ticketSelect');
  sel.innerHTML = '<option value="">— 价格库选景点 —</option>';
  let list = [];
  for (const [ci, arr] of Object.entries(TICKET_BY_CITY)) {
    const cleanCi = ci.replace(/\n.*/g,'').trim();
    if (!city || cleanCi === city || cleanCi.includes(city) || city.includes(cleanCi))
      list = list.concat(arr);
  }
  const seen = new Set();
  for (const t of list) {
    if (seen.has(t.n)) continue; seen.add(t.n);
    const opt = document.createElement('option');
    opt.value = JSON.stringify({ name: t.n, eur: parseFloat(t.p)||0, display: t.d });
    opt.textContent = `${t.n}  ${t.d}`;
    sel.appendChild(opt);
  }
}

// ══════════════════════════════════════
// Master calc — totals all modules
// ══════════════════════════════════════
function calcAll() {
  const pax  = int('pax') || 1;
  const days = int('days') || 1;

  // Car
  const carCny = state.car.reduce((s, it) => s + conv(it.eur * (it.days||1)), 0);
  $('r-car').textContent = carCny > 0 ? fmtC(carCny) : '—';
  $('sub-car').textContent = state.car.length
    ? state.car.map(it => `${it.label} ${it.carTypeLabel} €${it.eur}×${it.days||1}天 → ¥${conv(it.eur*(it.days||1)).toLocaleString()}`).join('  ·  ')
    : '';

  // Transfer
  const transferCny = state.transfer.reduce((s, it) => s + conv(it.eur), 0);
  $('r-transfer').textContent = transferCny > 0 ? fmtC(transferCny) : '—';
  $('sub-transfer').textContent = state.transfer.length
    ? state.transfer.map(it => `${it.type} ${it.city} €${it.eur} → ¥${conv(it.eur).toLocaleString()}`).join('  ·  ')
    : '';

  // Ticket
  const ticketCny = state.ticket.reduce((s, it) => s + conv(it.eur * (it.qty||1)), 0);
  $('r-ticket').textContent = ticketCny > 0 ? fmtC(ticketCny) : '—';
  $('sub-ticket').textContent = state.ticket.length
    ? state.ticket.map(it => `${it.name} €${it.eur}×${it.qty||1}人 → ¥${conv(it.eur*(it.qty||1)).toLocaleString()}`).join('  ·  ')
    : '';

  // Hotel
  const hotelCny = state.hotel.reduce((s, it) => s + conv(it.eur * (it.nights||1)), 0);
  $('r-hotel').textContent = hotelCny > 0 ? fmtC(hotelCny) : '—';
  $('sub-hotel').textContent = state.hotel.length
    ? state.hotel.map(it => `${it.city} €${it.eur}×${it.nights||1}晚 → ¥${conv(it.eur*(it.nights||1)).toLocaleString()}`).join('  ·  ')
    : '';

  // Deadhead
  const deadCny = state.deadhead.reduce((s, it) => s + conv(it.eur * (parseFloat(it.count)||1)), 0);
  $('r-deadhead').textContent = deadCny > 0 ? fmtC(deadCny) : '—';
  $('sub-deadhead').textContent = state.deadhead.length
    ? state.deadhead.map(it => `${it.desc} €${it.eur}×${it.count}段 → ¥${conv(it.eur*(parseFloat(it.count)||1)).toLocaleString()}`).join('  ·  ')
    : '';

  // Service
  const svcRate = num('svcRate') || 100;
  const svcCny = Math.ceil(svcRate * pax * days);
  $('r-service').textContent = fmtC(svcCny);
  $('svcDisplay').value = `¥${svcRate} × ${pax}人 × ${days}天 = ¥${svcCny.toLocaleString()}`;
  $('sub-service').textContent = `服务费固定公式：¥${svcRate}/人/天`;

  // Grand
  const grand = carCny + transferCny + ticketCny + hotelCny + deadCny + svcCny;
  $('grandTotal').textContent = grand > 0 ? `¥ ${grand.toLocaleString('zh-CN')}` : '¥ —';

  const parts = [];
  if (carCny > 0)      parts.push(`包车 ¥${carCny.toLocaleString()}`);
  if (transferCny > 0) parts.push(`接送机 ¥${transferCny.toLocaleString()}`);
  if (ticketCny > 0)   parts.push(`门票 ¥${ticketCny.toLocaleString()}`);
  if (hotelCny > 0)    parts.push(`住宿 ¥${hotelCny.toLocaleString()}`);
  if (deadCny > 0)     parts.push(`空返 ¥${deadCny.toLocaleString()}`);
  parts.push(`服务费 ¥${svcCny.toLocaleString()}`);
  $('grandSub').textContent = parts.join(' + ');

  const pp = grand > 0 ? Math.ceil(grand / pax) : 0;
  if (pp > 0) {
    $('perPax').style.display = '';
    $('perPax').textContent = `人均 ¥${pp.toLocaleString('zh-CN')}${days>1?' · 人均/天 ¥'+Math.ceil(pp/days).toLocaleString():''}`;
  } else {
    $('perPax').style.display = 'none';
  }
}

// ══════════════════════════════════════
// Generate quote card
// ══════════════════════════════════════
function generateQuote() {
  const city  = $('city').value || '目的地';
  const pax   = int('pax') || 1;
  const days  = int('days') || 1;
  const today = new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
  const ds = $('dateStart').value, de = $('dateEnd').value;
  let dateRange = fmtDate(ds);
  if (de && de !== ds) dateRange += ` — ${fmtDate(de)}`;

  const carCny      = state.car.reduce((s,it) => s + conv(it.eur*(it.days||1)), 0);
  const transferCny = state.transfer.reduce((s,it) => s + conv(it.eur), 0);
  const ticketCny   = state.ticket.reduce((s,it) => s + conv(it.eur*(it.qty||1)), 0);
  const hotelCny    = state.hotel.reduce((s,it) => s + conv(it.eur*(it.nights||1)), 0);
  const deadCny     = state.deadhead.reduce((s,it) => s + conv(it.eur*(parseFloat(it.count)||1)), 0);
  const svcCny      = Math.ceil((num('svcRate')||100) * pax * days);
  const grand       = carCny + transferCny + ticketCny + hotelCny + deadCny + svcCny;
  const pp          = Math.ceil(grand / pax);

  // Build table rows
  let rows = '';
  const row = (cat, detail, cny) =>
    `<tr><td>${cat}</td><td style="color:var(--muted);font-size:.75rem">${detail}</td><td class="num">¥ ${Math.round(cny).toLocaleString()}</td></tr>`;

  if (state.car.length) {
    rows += `<tr class="cat-hdr"><td colspan="3">🚐 专属包车</td></tr>`;
    state.car.forEach(it => rows += row(it.label, `${it.carTypeLabel} · €${it.eur}/天 × ${it.days||1}天`, conv(it.eur*(it.days||1))));
  }
  if (state.transfer.length) {
    rows += `<tr class="cat-hdr"><td colspan="3">✈️ 接送机</td></tr>`;
    state.transfer.forEach(it => rows += row(it.type, `${it.city} · €${it.eur}`, conv(it.eur)));
  }
  if (state.ticket.length) {
    rows += `<tr class="cat-hdr"><td colspan="3">🎟 景点门票</td></tr>`;
    state.ticket.forEach(it => rows += row(it.name, `€${it.eur}/人 × ${it.qty||1}人`, conv(it.eur*(it.qty||1))));
  }
  if (state.hotel.length) {
    rows += `<tr class="cat-hdr"><td colspan="3">🏨 司导住宿</td></tr>`;
    state.hotel.forEach(it => rows += row(it.city, `€${it.eur}/晚 × ${it.nights||1}晚`, conv(it.eur*(it.nights||1))));
  }
  if (state.deadhead.length) {
    rows += `<tr class="cat-hdr"><td colspan="3">🔄 空返费</td></tr>`;
    state.deadhead.forEach(it => rows += row(it.desc, `€${it.eur}/段 × ${it.count}段`, conv(it.eur*(parseFloat(it.count)||1))));
  }
  rows += `<tr class="cat-hdr"><td colspan="3">⭐ 服务费</td></tr>`;
  rows += row('服务费', `¥${num('svcRate')||100}/人/天 × ${pax}人 × ${days}天`, svcCny);

  const svc = $('service').value;
  const notes = $('notes').value;

  $('quoteOutput').innerHTML = `
<div class="quote-card">
  <div class="quote-date">${today}</div>
  <div class="co-name">定制旅行服务 · 专属报价</div>
  <h2>${city} 定制旅行方案</h2>
  <div class="info-grid">
    <div class="info-item"><span class="key">行程日期</span><span class="val">${dateRange}</span></div>
    <div class="info-item"><span class="key">出行人数</span><span class="val">${pax} 人</span></div>
    <div class="info-item"><span class="key">目的地</span><span class="val">${city}</span></div>
    <div class="info-item"><span class="key">行程天数</span><span class="val">${days} 天</span></div>
  </div>
  ${svc ? `<div class="svc-block">${svc}</div>` : ''}
  <table class="cost-table">
    <thead><tr><th>项目</th><th>说明</th><th>金额（CNY）</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr class="grand"><td colspan="2"><strong>总报价</strong></td><td class="num"><strong>¥ ${grand.toLocaleString()}</strong></td></tr></tfoot>
  </table>
  <div class="qperpax">人均：¥ ${pp.toLocaleString()}${days>1?' · 人均/天：¥ '+Math.ceil(pp/days).toLocaleString():''}</div>
  ${notes ? `<div class="qnotes">📌 ${notes.replace(/\n/g,'<br>')}</div>` : ''}
</div>`;
}

// ══════════════════════════════════════
// Clear all
// ══════════════════════════════════════
function clearForm() {
  ['dateStart','dateEnd','city','service','notes',
   'in-car-city','in-car-eur','in-transfer-city','in-transfer-eur',
   'in-ticket-name','in-ticket-eur','in-ticket-qty',
   'in-hotel-city','in-hotel-eur','in-dh-desc','in-dh-eur'].forEach(id => { const el=$(id); if(el) el.value=''; });
  $('fxRate').value='8.3'; $('markup').value='1.35';
  $('pax').value='2'; $('days').value='1'; $('svcRate').value='100';
  $('in-car-days').value=1; $('in-hotel-nights').value=1;
  state.car=[]; state.transfer=[]; state.ticket=[]; state.hotel=[]; state.deadhead=[];
  ['car','transfer','ticket','hotel','deadhead'].forEach(k => $(`list-${k}`).innerHTML=''); renderTickets();
  $('autoBadge').classList.remove('show');
  updateTicketDropdown('');
  calcAll();
  $('quoteOutput').innerHTML=`<div class="empty-state"><div class="icon">✦</div><p>填写左侧信息后点击生成报价单</p></div>`;
}

// Init
updateTicketDropdown('');
calcAll();
</script>
